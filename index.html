<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@shipitandpray/pretext-terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050b12;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --panel: rgba(11, 18, 32, 0.92);
      --border: rgba(148, 163, 184, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.14), transparent 30%),
        linear-gradient(180deg, #040911 0%, #09101b 100%);
    }
    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 40px 18px 64px;
    }
    .hero {
      display: grid;
      gap: 22px;
      grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr);
      align-items: start;
    }
    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.5rem, 5vw, 4.8rem);
      line-height: 0.92;
    }
    .lede {
      margin: 0 0 18px;
      max-width: 35rem;
      line-height: 1.7;
      color: var(--muted);
      font-size: 1.05rem;
    }
    .pill-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      color: #dbeafe;
      font-size: 13px;
    }
    .terminal-shell {
      padding: 14px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
      overflow: auto;
    }
    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.0",
        "react/jsx-runtime": "https://esm.sh/react@19.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@19.2.0/client",
        "@chenglou/pretext": "https://esm.sh/@chenglou/pretext@0.0.3"
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
